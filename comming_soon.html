<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Dr. Brindha Skin & Hair Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #f8e8ee, #e3f2fd);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #333;
    }

    .container {
      max-width: 600px;
      padding: 40px;
      background: #ffffffcc;
      backdrop-filter: blur(10px);
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 2.5rem;
      color: #c2185b;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: 400;
      margin-bottom: 20px;
      color: #555;
    }

    p {
      margin-bottom: 30px;
      font-size: 1rem;
      line-height: 1.6;
    }

    .email-box {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    input[type="email"] {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px 0 0 8px;
      outline: none;
      width: 70%;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #c2185b;
      color: white;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #a3154a;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #777;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
      }

      .email-box {
        flex-direction: column;
      }

      input[type="email"], button {
        width: 100%;
        border-radius: 8px;
        margin: 5px 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dr. Brindha</h1>
    <h2>Skin & Hair Clinic</h2>
    <p>
      We are working on something amazing! Our clinic will be launching soon to bring you expert skincare and haircare solutions.
    </p>

    <p>Stay tuned for updates ✨</p>

    <div class="footer">
      © 2026 Dr. Brindha Skin & Hair Clinic
    </div>
  </div>
</body>
</html>
